<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipe Black Belt</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="credito">
    <div>By Marllon Rocha - Equipe Black Belt</div>
    <img src="https://img.freepik.com/premium-vector/south-korea-national-flag-grunge-brush-stroke-vector-illustration-transparent-background_601298-10343.jpg"
         style="width:60px; height:60px; border-radius:50%; margin-top:5px;">
</div>

<h1>🥋Black Belt</h1>

<section id="telaInicial" class="tela">

    <div class="conteudo-inicial">
        <img src="https://taekwondo-horvat.com/wp-content/uploads/2021/03/IMG_0217-1024x947.jpg" 
             alt="Imagem inicial"
             class="imagem-inicial">

        <img src="https://i.pinimg.com/736x/67/8a/d9/678ad98e3a425a7db555372eefb78cae.jpg" 
             alt="Imagem inicial 2"
             class="imagem-inicial">
    </div>

</section>

<section id="jogoTela" class="tela hidden">
<h2>Escreva o nome da técnica</h2>

<img id="imagemTecnica">
<div id="areaMontada"></div>
<div id="opcoes"></div>

<button class="verificar" onclick="verificar()">Verificar</button>
<button class="apagar" onclick="apagarUltima()">Apagar Última</button>
<button class="pular" onclick="pularTecnica()">Pular</button>

<p id="resultado"></p>

</section>

<section id="apostila" class="tela hidden">
    <h2>Apostila Black Belt</h2>
        <!-- BOTÕES DAS FAIXAS -->
    <div class="menu-faixas">

        <button onclick="mostrarFaixa('gub10')">Faixa Branca 10º GUB</button>
        <button onclick="mostrarFaixa('gub8')">Faixa Amarela 8º GUB</button>
        <button onclick="mostrarFaixa('gub7')">Faixa Amarela Ponta Verde 7º GUB</button>
        <button onclick="mostrarFaixa('gub6')">Faixa Verde 6º GUB</button>
        <button onclick="mostrarFaixa('gub5')">Faixa Verde Ponta Azul 5º GUB</button>
        <button onclick="mostrarFaixa('gub4')">Faixa Azul 4º GUB</button>
        <button onclick="mostrarFaixa('gub3')">Faixa Azul Ponta Vermelha 3º GUB</button>
        <button onclick="mostrarFaixa('gub2')">Faixa Vermelha 2º GUB</button>
        <button onclick="mostrarFaixa('gub1')">Faixa Vermelha Ponta Preta 1º GUB</button>

    </div>
    <div id="conteudo-faixa"></div>
    
    
</section>

<section id="poomsaeTela" class="tela hidden">
<h2>📺 Poomsae</h2>

<div class="poomsae-grid">

<button onclick="abrirPoomsae(61)">Faixa Amarela - Taegeuk 1 Jang</button>
<button onclick="abrirPoomsae(99)">Faixa Amarela Ponta Verde - Taegeuk 2 Jang</button>
<button onclick="abrirPoomsae(140)">Faixa Verde - Taegeuk 3 Jang</button>
<button onclick="abrirPoomsae(188)">Faixa Verde Ponta Azul - Taegeuk 4 Jang</button>
<button onclick="abrirPoomsae(234)">Faixa Azul - Taegeuk 5 Jang</button>
<button onclick="abrirPoomsae(285)">Faixa Azul Ponta Vermelha - Taegeuk 6 Jang</button>
<button onclick="abrirPoomsae(340)">Faixa Vermelha - Taegeuk 7 Jang</button>
<button onclick="abrirPoomsae(396)">Faixa Vermelha Ponta Preta - Taegeuk 8 Jang</button>

</div>

</section>

<section id="sebonDubon" class="tela hidden">
    <h2>📺 Sebon e Dubon Kyorugui</h2>
    <h2>DISPONÍVEL APÓS A GRAVAÇÃO DOS VÍDEOS</h2>

    <div class="container-kyorugui">

        <!-- SEBON -->
        <div class="card-kyorugui">
            <h3>Sebon Kyorugui</h3>

            <div class="lista-botoes">
                <button>Sebon Kyorugui - 1 a 5</button>
                <button>Sebon Kyorugui - 6 a 10</button>
                <button>Sebon Kyorugui - 11 a 15</button>
                <button>Sebon Kyorugui - 16 a 20</button>
                <button>Sebon Kyorugui - 21 a 25</button>
                <button>Sebon Kyorugui - 26 a 30</button>
            </div>
        </div>

        <!-- DUBON -->
        <div class="card-kyorugui">
            <h3>Dubon Kyorugui</h3>

            <div class="lista-botoes">
                <button>Dubon Kyorugui - 1 a 4</button>
                <button>Dubon Kyorugui - 5 a 8</button>
                <button>Dubon Kyorugui - 9 a 12</button>
                <button>Dubon Kyorugui - 13 a 16</button>
                <button>Hanja Kyorugui - 1 a 9</button>
            </div>
        </div>

    </div>
</section>

<section id="adminTela" class="tela hidden">
    <h2>Administração</h2>

    <button class="exportar" onclick="exportarTecnicas()">
        📤 Exportar Técnicas
    </button>

    <input type="file" id="importFile" hidden>
    <button class="importar" onclick="document.getElementById('importFile').click()">
        📥 Importar Técnicas
    </button>

    <button style="background:#b00020; color:white;" onclick="resetarBanco()">
        🔄 Resetar Banco de Dados
    </button>

    <h4>Cadastrar Técnica</h4>

<input type="text" id="imagemInput" placeholder="Link da imagem">
<textarea id="respostaInput" placeholder="Resposta correta (separar por espaço)"></textarea>
<textarea id="erradasInput" placeholder="Opções de nomes errados (separar por vírgula)"></textarea>

<button class="cadastrar" onclick="cadastrarTecnica()">Cadastrar</button>


<button class="toggle-btn" onclick="toggleLista()">Mostrar Técnicas Cadastradas</button>

<div id="listaContainer" class="hidden">
<h3>Técnicas Cadastradas</h3>
<div id="listaTecnicas"></div>
</div>
</section>

<div id="overlayResultado" class="overlay hidden">
    <div id="overlayTexto"></div>
</div>

<div class="menuInferior">
    <button onclick="trocarTela('jogoTela')">Jogo</button>
    <button onclick="trocarTela('apostila')">Apostila</button>
    <button onclick="trocarTela('poomsaeTela')">Poomsae</button>
    <button onclick="trocarTela('sebonDubon')">Sebon/Dubon</button>
    <button onclick="trocarTela('adminTela')">Admin</button>
</div>

<script src="js/utils.js"></script>
<script src="js/admin.js"></script>
<script src="js/jogo.js"></script>
<script src="js/apostila.js"></script>
<script src="js/main.js"></script>

</body>
</html>
